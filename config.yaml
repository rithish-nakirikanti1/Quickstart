# iii engine configuration
# Docs: https://iii.dev/docs/how-to/configure-engine
workers:
  - name: iii-observability
    config:
      enabled: true
      service_name: iii
      exporter: memory
      memory_max_spans: 10000
      metrics_enabled: true
      metrics_exporter: memory
      logs_enabled: true
      logs_exporter: memory
      logs_console_output: true
      sampling_ratio: 1.0

  - name: iii-queue
    config:
      adapter:
        name: builtin
  - name: math-worker
    worker_path: /Users/rithishnakirikanti/Downloads/devops/quickstart/workers/math-worker
  - name: caller-worker
    worker_path: /Users/rithishnakirikanti/Downloads/devops/quickstart/workers/caller-worker
  - name: iii-state
    config:
      adapter:
        config:
          file_path: ./data/state_store.db
          store_method: file_based
        name: kv
  - name: iii-http
    config:
      concurrency_request_limit: 1024
      cors:
        allowed_methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        allowed_origins:
        - '*'
      default_timeout: 30000
      host: 127.0.0.1
      port: 3111
